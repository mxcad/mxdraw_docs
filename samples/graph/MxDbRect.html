<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MxDbRect 示例</title>
    <link rel="stylesheet" href="../index.css">
</head>
<script src="../three.js"></script>
<script type="module">
    import Mx from "../mxdraw.es5.js"
    import GUI from "../lil-gui.module.js"

    Mx.loadCoreCode().then(() => {
        Mx.MxFun.setIniset({
            // 启用对象选择功能.
            EnableIntelliSelect: true,
            // 选择类型
            IntelliSelectType: 1,
            // 是否开启多个选择
            multipleSelect: false,
        });
        // 创建控件对象
        Mx.MxFun.createMxObject({
            canvasId: "mxcad", // canvas元素的id
            cadFile: "../../demo/buf/$hhhh.dwg.mxb1.wgh",
            useWebsocket: false,
            callback: (mxDrawObject, { canvas, canvasParent }) => {

            },
        });

        // 实例化取点对象
        const getPoint = new Mx.MrxDbgUiPrPoint();

        // 鼠标第一次点击
        getPoint.go((status) => {
            if (status != 0) {
                return
            }

            // 当前鼠标位置
            const pt1 = getPoint.value()
            // 实例化矩形对象rect
            let rect = new Mx.MxDbRect();
            // 设置第一个点位置
            rect.pt1 = pt1
            // 设置颜色
            rect.setColor(0xFF22);

            // 实例化动态绘制对象
            const worldDrawComment = new Mx.McEdGetPointWorldDrawObject();
            // 设置动态绘制回调函数
            worldDrawComment.setDraw((currentPoint) => {
                // 设置线段第二个点位置
                rect.pt2 =currentPoint
                // 绘制矩形对象rect
                worldDrawComment.drawCustomEntity(rect);
            });

            // 让当前去点对象使用动态绘制对象
            getPoint.setUserDraw(worldDrawComment)

            // 鼠标第二次点击
            getPoint.go((status) => {
                if (status == Mx.MrxDbgUiPrBaseReturn.kOk) {

                    // 获取控件对象并将矩形对象rect添加到画布中
                    Mx.MxFun.getCurrentDraw().addMxEntity(rect);

                } else {
                    console.log('放弃当前操作')

                }
            })

            // GUI
            const gui = new GUI();
            gui.add(rect, 'isSolidColorFill').name('isSolidColorFill 填充模式')
            const setPoint1 = gui.addFolder('pt1')
            const setPoint2 = gui.addFolder('pt2')
            setPoint1.add(rect.pt1, 'x')
            setPoint1.add(rect.pt1, 'y');
            setPoint1.add(rect.pt1, 'z');
            setPoint2.add(rect.pt2, 'x');
            setPoint2.add(rect.pt2, 'y');
            setPoint2.add(rect.pt2, 'z');
            let params = {
                setRadius: 0,
                setFillImagePath: ""
            }
            
            
            gui.add(params, 'setRadius', 0, 100).onChange((value)=> {
                rect.setRadius(value)
                rect.setNeedUpdateDisplay(true)
            })
            
            gui.addColor(rect, 'color')
            
            gui.add(params, 'setFillImagePath', [ '../../img/dlyx_icon.png', '../../img/kpt_icon.png', '../../img/wmxs_icon.png' ]).onChange(src=> {
                rect.setFillImagePath(src)
                rect.setNeedUpdateDisplay(true)
            })
            gui.onFinishChange((event) => {
                rect.setNeedUpdateDisplay(true)
            })

        })
    })

</script>

<body>
    <div class="mxdiv">
        <canvas id="mxcad"></canvas>
    </div>

</body>


</html>
